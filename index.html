<!DOCTYPE html>
<html lang="ja">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>QRコードを探す</title>
  
  <head>
    <base target="_top">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>

      body {
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f9f9f9;
      }

      .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        font-size: 1.5rem;
      }

      #scanner-container {
        width: 100%;
        aspect-ratio: 3 / 4;
        border: 2px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
        background-color: black;
        position: relative;
        text-align:center;
      }
      
      #scanner-container > video, #scanner-container > canvas {
        width: 100%;
      }
      
      #scanner-container > canvas {
        position: absolute;
        left: 0px; top: 0px;
      }
      
      .button-container{
        display: flex;
        justify-content: center; 
      }
      
      button {
        width: 100%;
        padding: 12px;
        margin: 10px;
        font-size: 1rem;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }

      #barcode,
      #result {
        margin-top: 12px;
        text-align: center;
        font-weight: bold;
        font-size: 1rem;
      }

      @media (max-width: 480px) {
        h2 {
          font-size: 1.2rem;
        }

        button {
          font-size: 0.95rem;
          padding: 10px;
        }
      }
    </style>


  </head>
  
  <script src="https://unpkg.com/@ericblade/quagga2@1.7.4/dist/quagga.min.js"></script>

  <body>

    <h2>箱探しアプリ</h2>
     
      
      <div id="scanner-container"></div>
    <!--
      <div id="barcode">スキャン結果: なし</div>
    -->
    <div id="result">スキャン結果: なし</div>
      
    <div class = "button-container">

        <button id="btnA">ボタンA：Codabarを読み取り</button>
        <button id="btnB">ボタンB：ITFを検索開始</button>
        <div id="status">待機中...</div>
      </div>
      
    <div class="container">
    
      解像度の設定
      <form id="myForm">
        <input type="radio" name="resolution" value="HD" checked>HD(1280×720)
        <input type="radio" name="resolution" value="フルHD">フルHD(1920×1080)
        <button id="configBtn">解像度の設定</button>

      </form>
    </div>

    
    

    <script>
  
      let targetCode = ""; 
      let currentMode = ""; 

      const quaggaConfig = {
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector("#scanner-container"),
          constraints: {
            facingMode: "environment",
            width: { ideal: 1280 }, // デフォルトの解像度をHD画質で設定
            height: { ideal: 720 }
          }  
        },
        locator: {
          patchSize: "medium",
          halfSample: true
        },
        decoder: {
          readers: ["codabar_reader", "i2of5_reader"]
        },
        
        locate: true
      };

        // 共通の初期化・開始関数
        function startScanner() {
          Quagga.init(quaggaConfig, function (err) {
            if (err) {
              console.error(err);
              return;
            }
            Quagga.start();
          });
        }

        // 初回起動
        startScanner();

        // ボタンA：モードを切り替えるだけ（再initは不要）
        document.getElementById('btnA').addEventListener('click', () => {
          currentMode = "SCAN_TARGET";
          document.getElementById('status').innerText = "モード：Codabarを読み取ってください";
          // もしstopしていたらstartさせる
          Quagga.start();
        });

        // ボタンB：モードを切り替えるだけ
        document.getElementById('btnB').addEventListener('click', () => {
          if (!targetCode) {
            alert("先にCodabarを登録してください");
            return;
          }
          currentMode = "FIND_TARGET";
          document.getElementById('status').innerText = "モード：ITFを検索中 (" + targetCode + ")";
          Quagga.start();
        });

        Quagga.onDetected(function(result) {
          const code = result.codeResult.code;
          const format = result.codeResult.format;

          if (currentMode === "SCAN_TARGET") {
            if (format === "codabar") {
              // スタート文字、ストップ文字を避ける
              targetCode = code.substr(1,9);
              currentMode = ""; 
              document.getElementById('status').innerText = "登録完了: " + targetCode;
              alert("ターゲットを登録しました: " + targetCode);
              
              //  Interleaved 2of5 コードは桁数が偶数なので、targetCodeの頭に0をつける
              // targetCode = '0' + code.substr(1, 9);
              
              // 必要に応じてここで止めるか、そのままにする
            }
          } else if (currentMode === "FIND_TARGET") {
            if (code === targetCode) {
              console.log("ターゲット発見！");
              document.getElementById('barcode').innerText = "発見！: " + code;
            }
          }
        });

       Quagga.onProcessed(function(result) {
        const drawingCanvas = Quagga.canvas.dom.overlay;
        if (!drawingCanvas) return;
      
        const drawingCtx = drawingCanvas.getContext('2d');
      
        // 1. 毎フレーム、描画をクリアする
        drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
      
        // 2. result があり、かつ「実際にコードが読み取れた（codeResultがある）」場合のみ描画
        if (result && result.codeResult) {
          
          // 青枠（バーコード全体を囲う枠）を描画
          if (result.box) {
            Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "blue", lineWidth: 2 });
          }
      
          // 緑の線（スキャンした中心線）を描画
          if (result.line) {
            Quagga.ImageDebug.drawPath(result.line, { x: 'x', y: 'y' }, drawingCtx, { color: "green", lineWidth: 4 });
          }
      
          // 3. ターゲット一致時の特別な処理
          if (currentMode === "FIND_TARGET" && result.codeResult.code === targetCode) {
            // ターゲット発見時は枠を赤くするなど、色を変えるのもアリです
            Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "red", lineWidth: 5 });
            document.getElementById('result').innerText = "ターゲット検出!: " + result.codeResult.code;
          } else {
            document.getElementById('result').innerText = "スキャン中: " + result.codeResult.code;
          }
        } else {
          // コードが読み取れていない時はテキストをリセット
          document.getElementById('result').innerText = "スキャン中...";
        }
      });

      // 解像度の設定を反映して再起動する関数
      function restartWithNewResolution() {
        // 1. 現在のラジオボタンの選択値を取得
        let selectedRes = 'HD'; // デフォルト
        const elements = document.getElementsByName('resolution');
        for (let i = 0; i < elements.length; i++) {
          if (elements[i].checked) {
            selectedRes = elements[i].value;
            break;
          }
        }
      
        // 2. 解像度設定を構築
        let width, height;
        if (selectedRes === "フルHD") {
          width = { ideal: 1920 };
          height = { ideal: 1080 };
        } else {
          width = { ideal: 1280 };
          height = { ideal: 720 };
        }
      
        // 3. 一度停止させる
        Quagga.stop();
      
        // 4. 新しい設定で再初期化
        // quaggaConfigの値を書き換える
        quaggaConfig.inputStream.constraints.width = width;
        quaggaConfig.inputStream.constraints.height = height;
      
        Quagga.init(quaggaConfig, function (err) {
          if (err) {
            console.error("再初期化エラー:", err);
            return;
          }
          console.log("解像度を変更して再起動しました:", selectedRes);
          Quagga.start();
        });
      }
      
      document.getElementById('configBtn').addEventListener('click', function() {
        // モードなどの状態を維持したまま再起動
        restartWithNewResolution();       
      });



      
    </script>
  </body>
