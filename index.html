<!DOCTYPE html>
<html lang="ja">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>バーコードを探す</title>
  
  <head>
    <base target="_top">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>


      #interactive.viewport { position: relative; width: 100%; height: auto; overflow: hidden; }
      #interactive.viewport > canvas, #interactive.viewport > video { width: 100%; height: auto; vertical-align: top; }
      canvas.drawingBuffer { position: absolute; top: 0; left: 0; }
      #result { padding: 10px; font-weight: bold; color: green; }

      #interactive {
        width: 100%;
        height: 400px; /* 一時的に固定値を設定して確認 */
        background-color: #eee; /* 領域が見えるように背景色をつける */
      }

      #interactive video {
        width: 100%;
        height: auto;
      }

      body {
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f9f9f9;
      }

      .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        text-align: center;
        font-size: 1.5rem;
      }

      #scanner-container {
        width: 100%;
        aspect-ratio: 3 / 4;
        border: 2px solid #ccc;
        border-radius: 8px;
        overflow: hidden;
        background-color: black;
        position: relative;
        text-align:center;
      }

      button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        font-size: 1rem;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background-color: #45a049;
      }

      #barcode,
      #result {
        margin-top: 12px;
        text-align: center;
        font-weight: bold;
        font-size: 1rem;
      }

      @media (max-width: 480px) {
        h2 {
          font-size: 1.2rem;
        }

        button {
          font-size: 0.95rem;
          padding: 10px;
        }
      }
    </style>


  </head>
  
  <script src="https://unpkg.com/@ericblade/quagga2@1.7.4/dist/quagga.min.js"></script>

  <body>






    <h2>箱探しアプリ</h2>
     
    <div class="container">
    
      解像度の設定
      <form id="myForm">
        <input type="radio" name="resolution" value="HD" checked>HD(1280×720)
        <input type="radio" name="resolution" value="フルHD">フルHD(1920×1080)
        <!--
        <button type="button" onclick="sendValue()">確定</button>
        -->
      </form>
    </div>
    <div class = "button-container">

        <button id="startScanBtn">作業開始</button>

      </div>
    <div>
      <p>探しているITFコード: <strong id="target-display"></strong></p>
      <div id="interactive" class="viewport"></div>
      <div id="result"></div>
    </div>

      <div id="scanner-container"></div>
      
      <div id="barcode">スキャン結果: なし</div>
      <div class = "button-container">

        <button id="btnA">ボタンA：Codabarを登録</button>
        <button id="btnB">ボタンB：ITFを検索開始</button>
        <div id="status">待機中...</div>
      </div>
    
    

    <script>

      // 解像度を変数に入れる  
      let elements = document.getElementsByName('resolution');
      let len = elements.length;
      let checkValue = '';

      for (let i = 0; i < len; i++){
          if (elements.item(i).checked){
              checkValue = elements.item(i).value;
          }
      }


      let targetCode = ""; 
      let currentMode = ""; // "SCAN_TARGET" or "FIND_TARGET"

      // 作業開始ボタンのクリックイベント
      document.getElementById('startScanBtn').addEventListener('click', function() {

        //Quagga.jsの設定情報を変数に入れる(init用)
        const quaggaConfig = {
              inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector("#interactive"),
                constraints: {
                  facingMode: "environment",
                  width: { ideal: 480 },
                  height: { ideal: 640 }
                }
              },
              locator: {
                patchSize: "medium",
                halfSample: true
              },
              numOfWorkers: navigator.hardwareConcurrency || 4,
              frequency: 10,
              decoder: {
                readers: ["codabar_reader", "i2of5_reader"]
              },
              locate: true
        }

        
        Quagga.init(
            quaggaConfig,
            function (err) {
              if (err) {
                console.error(err);
                document.getElementById("result").innerText = "❌ カメラエラー: " + err;
                return;
              }
              Quagga.start();
            }
        );

 



      });


      // ボタンAのクリックイベント
      document.getElementById('btnA').addEventListener('click', () => {
        currentMode = "SCAN_TARGET";
        document.getElementById('status').innerText = "モード：Codabarを読み取ってください";
      });

      // ボタンBのクリックイベント
      document.getElementById('btnB').addEventListener('click', () => {
        if (!targetCode) {
          alert("先にCodabarを登録してください");
          return;
        }
        currentMode = "FIND_TARGET";
        document.getElementById('status').innerText = "モード：ITFを検索中 (" + targetCode + ")";
      });

      document.getElementById("barcode").innerText = "スキャン結果:  なし" ;

      // 検出時のロジック分岐
      Quagga.onDetected(function(result) {
        const code = result.codeResult.code;

        if (currentMode === "SCAN_TARGET") {
          // ボタンA押下後の処理：Codabarを読み取って変数に保存
          if (result.codeResult.format === "codabar") {
            targetCode = code;
            currentMode = ""; // 登録完了したらモード解除
            document.getElementById('status').innerText = "登録完了: " + targetCode;
            alert("ターゲットを登録しました: " + targetCode);
          }
        } 
        else if (currentMode === "FIND_TARGET") {
          // ボタンB押下後の処理：一致するかチェック
          if (code === targetCode) {
            console.log("ターゲット発見！");
            // 見つけた時のアクション（アラートや音など）をここに書く
          }
        }
      });


      Quagga.onProcessed(function(result) {
            const drawingCtx = Quagga.Canvas.getContext(Quagga.canvas.dom.overlay, "2d");
            const drawingCanvas = Quagga.canvas.dom.overlay;

            if (result) {
              // 全てのコードを一旦青で描画（確認用）
              if (result.boxes) {
                drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                result.boxes.filter(function (box) {
                  return box !== result.box;
                }).forEach(function (box) {
                  Quagga.ImageDebug.drawPath(box, {x: 0, y: 1}, drawingCtx, {color: "blue", lineWidth: 2});
                });
              }

              // 3. 特定のコード(targetCode)を検出した時に緑色で囲う
              if (result.codeResult && result.codeResult.code === targetCode) {
                Quagga.ImageDebug.drawPath(result.line, {x: 'x', y: 'y'}, drawingCtx, {color: 'green', lineWidth: 4});
                document.getElementById('result').innerText = "ターゲット検出!: " + result.codeResult.code;
              } else {
                document.getElementById('result').innerText = "スキャン中...";
              }
            }
          });


    </script>
